# xspace/xspace.conf
#
# Single source of truth for all XSpace tool locations.
# Lives at the monorepo root (xspace/) — NOT inside _configure/.
#
# Sourced by _configure/install.sh and every space's bin/* dispatchers.
# All paths are relative to XSPACE_ROOT. Absolute resolution happens
# in each shell script after XSPACE_ROOT is resolved via BASH_SOURCE[0].
#
# ⚠️  NEVER declare a variable named XSPACE_DIR here.
#     install.sh uses _X_DIR internally for _configure/'s absolute path.
#     If xspace.conf overwrites it with a relative string, mkdir creates
#     a nested _configure/_configure/ directory.

# ─────────────────────────────────────────────────────────────────────────────
# CHANGELOG
# ─────────────────────────────────────────────────────────────────────────────
#   v0.5.0 — x-space/ renamed to _configure/. CONFIGURE_DIR added so any
#             script that needs to call the orchestrator (e.g. updatex) reads
#             the name from here rather than hardcoding it. _configure/bin
#             replaces x-space/bin in XSPACE_ALL_BIN_DIRS.
#   v0.4.0 — sys-space, backup-space, animate-space/bin added.
#   v0.3.0 — XSPACE_DIR removed (Bug 003 fix). XSPACE_ALL_BIN_DIRS added.
#   v0.2.0 — animate-svg paths.
#   v0.1.0 — Initial release.
# ─────────────────────────────────────────────────────────────────────────────

# ── Orchestrator directory name ───────────────────────────────────────────────
# Change here if the folder is ever renamed again. One edit, everything follows.
CONFIGURE_DIR="_configure"

# ── Space root directories ────────────────────────────────────────────────────
ANIMATESPACE_DIR="animate-space"
GITSPACE_DIR="git-space"
SYSSPACE_DIR="sys-space"
BACKUPSPACE_DIR="backup-space"
CODESPACE_DIR="code-space"

# ── All space bin directories — drives PATH + ~/bin symlink setup ─────────────
# install.sh loops this array. For each entry it:
#   1. Writes a PATH entry to shell RC (auto-discovery for future scripts)
#   2. Symlinks all current executables to ~/bin
#
# Adding a new space: append its bin dir + re-run install.sh once.
# After that, new scripts in that dir are auto-discovered on next terminal.
declare -a XSPACE_ALL_BIN_DIRS=(
    "_configure/bin"
    "animate-space/bin"
    "git-space/bin"
    "sys-space/bin"
    "backup-space/bin"
)

# ── animate-space paths ───────────────────────────────────────────────────────
ANIMATEX_LIB_DIR="${ANIMATESPACE_DIR}/lib"

ANIMATEX_TEXT_DIR="${ANIMATESPACE_DIR}/animate-text"
ANIMATEX_TEXT_FONTS_DIR="${ANIMATEX_TEXT_DIR}/fonts"
ANIMATEX_TEXT_EXPORTS_DIR="${ANIMATEX_TEXT_DIR}/exports"
ANIMATEX_TEXT_SCRIPT="${ANIMATEX_TEXT_DIR}/python/gradient_typing_effect.py"

ANIMATEX_SVG_DIR="${ANIMATESPACE_DIR}/animate-svg"
ANIMATEX_SVG_FONTS_DIR="${ANIMATEX_SVG_DIR}/fonts"
ANIMATEX_SVG_EXPORTS_DIR="${ANIMATEX_SVG_DIR}/exports"
ANIMATEX_SVG_SCRIPT="${ANIMATEX_SVG_DIR}/python/svg_typing_effect.py"

# ── git-space paths ───────────────────────────────────────────────────────────
GITSPACE_BIN_DIR="${GITSPACE_DIR}/bin"
GITSPACE_LIB_DIR="${GITSPACE_DIR}/lib"
GITSPACE_COMPLETION="${GITSPACE_DIR}/completion/gitspace-completion.sh"
GITSPACE_TEMPLATES_DIR="${GITSPACE_DIR}/templates"
GITSPACE_LOG_DIR="${HOME}/.gitspace/logs"

# ── sys-space paths ───────────────────────────────────────────────────────────
SYSSPACE_BIN_DIR="${SYSSPACE_DIR}/bin"
SYSSPACE_LIB_DIR="${SYSSPACE_DIR}/lib"

# ── backup-space paths ────────────────────────────────────────────────────────
BACKUPSPACE_BIN_DIR="${BACKUPSPACE_DIR}/bin"
BACKUPSPACE_LIB_DIR="${BACKUPSPACE_DIR}/lib"
BACKUPSPACE_CONFIG_DIR="${BACKUPSPACE_DIR}/config"
BACKUPSPACE_LOG_DIR="${BACKUPSPACE_DIR}/logs"
BACKUPSPACE_CONF="${BACKUPSPACE_DIR}/config/backups.conf"

# ── User bin target ───────────────────────────────────────────────────────────
USER_BIN_DEFAULT="$HOME/bin"