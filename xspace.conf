# xspace/xspace.conf
# Central configuration for the XSpace monorepo.
# Sourced by every bin/ dispatcher and by install.sh.
#
# CRITICAL: Never declare XSPACE_DIR here — see Bug 003 in the XSpace canvas.
# CRITICAL: XSPACE_ALL_BIN_DIRS drives both PATH wiring and ~/bin symlinks.
#           Add any new space's bin/ here when creating it.
#
# ─────────────────────────────────────────────────────────────────────────────
# CHANGELOG
# ─────────────────────────────────────────────────────────────────────────────
#   v0.8.0 — sconl-space renamed to isconl-space throughout. SCONLSPACE_DIR
#             replaced by ISCONLSPACE_DIR; all SCONLSPACE_* path vars renamed
#             to ISCONLSPACE_*. sconl-space/bin replaced by isconl-space/bin
#             in XSPACE_ALL_BIN_DIRS; new binaries isconl/iscope/ispace/ispark
#             registered. CODESPACE_DIR removed (code-space folder deleted).
#             Flutter/Dart/Firebase tooling paths added: FLUTTER_SDK_DIR (auto-
#             detected), DART_PUB_GLOBAL_DIR, FIREBASE_CLI_SOURCE, and
#             FLUTTERFIRE_CLI_SOURCE — used by install.sh Step 11 and updatex
#             --flutter. SCONLSPACE_DIR kept as a deprecated read-only alias
#             for any scripts that haven't migrated yet.
#   v0.7.0 — sconl-space paths expanded: full iSconl path set added.
#   v0.6.0 — (previous)
# ─────────────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────────────
# ── Orchestrator ──
# ─────────────────────────────────────────────────────────────────────────────

CONFIGURE_DIR="_configure"

# ─────────────────────────────────────────────────────────────────────────────
# ── Space root directory names (relative to XSPACE_ROOT) ──
# ─────────────────────────────────────────────────────────────────────────────

ANIMATESPACE_DIR="animate-space"
GITSPACE_DIR="git-space"
SYSSPACE_DIR="sys-space"
BACKUPSPACE_DIR="backup-space"
SERVERSPACE_DIR="server-space"
CREATORSPACE_DIR="creator-space"
ISCONLSPACE_DIR="isconl-space"

# Deprecated alias — kept for any scripts that haven't migrated yet.
# Points to the same folder. Will be removed in a future version.
SCONLSPACE_DIR="isconl-space"

# ─────────────────────────────────────────────────────────────────────────────
# ── All space bin directories ──
# Drives: (1) PATH entries in shell RC, (2) ~/bin symlinks for auto-discovery.
# Add a new space's bin/ here when creating it — no reinstall needed after that.
# ─────────────────────────────────────────────────────────────────────────────

declare -a XSPACE_ALL_BIN_DIRS=(
    "_configure/bin"
    "animate-space/bin"
    "git-space/bin"
    "sys-space/bin"
    "backup-space/bin"
    "server-space/bin"
    "creator-space/bin"
    "isconl-space/bin"
)

# ─────────────────────────────────────────────────────────────────────────────
# ── animate-space paths ──
# ─────────────────────────────────────────────────────────────────────────────

ANIMATEX_TEXT_DIR="animate-space/animate-text"
ANIMATEX_TEXT_FONTS_DIR="animate-space/animate-text/fonts"
ANIMATEX_TEXT_EXPORTS_DIR="animate-space/animate-text/exports"
ANIMATEX_TEXT_SCRIPT="animate-space/animate-text/animatex_text.sh"

ANIMATEX_SVG_DIR="animate-space/animate-svg"
ANIMATEX_SVG_EXPORTS_DIR="animate-space/animate-svg/exports"
ANIMATEX_SVG_FONTS_DIR="animate-space/animate-svg/fonts"
ANIMATEX_SVG_SCRIPT="animate-space/animate-svg/animatex_svg.sh"

# ─────────────────────────────────────────────────────────────────────────────
# ── git-space paths ──
# ─────────────────────────────────────────────────────────────────────────────

GITSPACE_LIB_DIR="git-space/lib"
GITSPACE_TEMPLATES_DIR="git-space/templates"
GITSPACE_LOG_DIR="git-space/logs"
GITSPACE_COMPLETION="git-space/completion/gitspace-completion.sh"

# ─────────────────────────────────────────────────────────────────────────────
# ── backup-space paths ──
# ─────────────────────────────────────────────────────────────────────────────

BACKUPSPACE_CONFIG_DIR="backup-space/config"
BACKUPSPACE_LOG_DIR="backup-space/logs"
BACKUPSPACE_CONF="backup-space/config/backups.conf"

# ─────────────────────────────────────────────────────────────────────────────
# ── isconl-space paths ──
# ─────────────────────────────────────────────────────────────────────────────

# Directories within the isconl-space repo folder
ISCONLSPACE_LIB_DIR="isconl-space/lib"
ISCONLSPACE_BIN_DIR="isconl-space/bin"
ISCONLSPACE_DATA_DIR="isconl-space/data"       # flat-file data (gitignored)
ISCONLSPACE_EQUICYCLE="isconl-space/lib/equicycle.py"

# iSconl SQLite database directory (used when Flutter apps are installed)
# This is outside the repo — personal data never committed.
# isconl auto-detects this: if scope.db is here, it switches to SQLite mode.
ISCONL_DATA_DIR="$HOME/.local/share/isconl"

# Individual DB paths — referenced by install.sh for directory creation
ISCONL_SCOPE_DB="$ISCONL_DATA_DIR/scope.db"
ISCONL_SPACE_DB="$ISCONL_DATA_DIR/space.db"
ISCONL_SPARK_DB="$ISCONL_DATA_DIR/spark.db"
ISCONL_EVENTS_DB="$ISCONL_DATA_DIR/isconl_events.db"

# Deprecated aliases — same values, kept for migration period
SCONLSPACE_LIB_DIR="$ISCONLSPACE_LIB_DIR"
SCONLSPACE_BIN_DIR="$ISCONLSPACE_BIN_DIR"
SCONLSPACE_DATA_DIR="$ISCONLSPACE_DATA_DIR"
SCONLSPACE_EQUICYCLE="$ISCONLSPACE_EQUICYCLE"

# ─────────────────────────────────────────────────────────────────────────────
# ── Flutter / Dart / Firebase tooling ──
# Used by install.sh (Step 11) and updatex (--flutter).
# These are detection hints only — never hardcoded paths that break portability.
# ─────────────────────────────────────────────────────────────────────────────

# Flutter SDK: common install locations checked by install.sh at runtime.
# Override by setting FLUTTER_SDK_DIR in your shell before sourcing this file.
FLUTTER_SDK_DIR="${FLUTTER_SDK_DIR:-}"

# Dart pub global cache (default: ~/.pub-cache)
DART_PUB_GLOBAL_DIR="${DART_PUB_GLOBAL_DIR:-$HOME/.pub-cache}"

# Firebase CLI installation source.
#   "npm"   — installed via:  npm install -g firebase-tools        (default)
#   "dart"  — installed via:  dart pub global activate firebase_cli (Dart-only CLI)
# updatex --flutter will upgrade whichever source is detected.
FIREBASE_CLI_SOURCE="${FIREBASE_CLI_SOURCE:-npm}"

# FlutterFire CLI installation source (always Dart pub global).
# dart pub global activate flutterfire_cli
FLUTTERFIRE_CLI_SOURCE="dart"

# ─────────────────────────────────────────────────────────────────────────────
# ── Shared / install ──
# ─────────────────────────────────────────────────────────────────────────────

USER_BIN_DEFAULT="$HOME/bin"