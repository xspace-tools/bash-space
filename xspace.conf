# xspace/xspace.conf
# Central configuration for the XSpace monorepo.
# Sourced by every bin/ dispatcher and by install.sh.
#
# CRITICAL: Never declare XSPACE_DIR here — see Bug 003 in the XSpace canvas.
# CRITICAL: XSPACE_ALL_BIN_DIRS drives both PATH wiring and ~/bin symlinks.
#           Add any new space's bin/ here when creating it.
#
# ─────────────────────────────────────────────────────────────────────────────
# CHANGELOG
# ─────────────────────────────────────────────────────────────────────────────
#   v0.7.0 — sconl-space paths expanded: full iSconl path set added.
#             SCONLSPACE_LIB_DIR, SCONLSPACE_DATA_DIR, SCONLSPACE_EQUICYCLE,
#             ISCONL_DATA_DIR + all four DB path vars.
#   v0.6.0 — (previous)
# ─────────────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────────────
# ── Orchestrator ──
# ─────────────────────────────────────────────────────────────────────────────

CONFIGURE_DIR="_configure"

# ─────────────────────────────────────────────────────────────────────────────
# ── Space root directory names (relative to XSPACE_ROOT) ──
# ─────────────────────────────────────────────────────────────────────────────

ANIMATESPACE_DIR="animate-space"
GITSPACE_DIR="git-space"
SYSSPACE_DIR="sys-space"
BACKUPSPACE_DIR="backup-space"
SERVERSPACE_DIR="server-space"
CREATORSPACE_DIR="creator-space"
SCONLSPACE_DIR="sconl-space"
CODESPACE_DIR="code-space"

# ─────────────────────────────────────────────────────────────────────────────
# ── All space bin directories ──
# Drives: (1) PATH entries in shell RC, (2) ~/bin symlinks for auto-discovery.
# Add a new space's bin/ here when creating it — no reinstall needed after that.
# ─────────────────────────────────────────────────────────────────────────────

declare -a XSPACE_ALL_BIN_DIRS=(
    "_configure/bin"
    "animate-space/bin"
    "git-space/bin"
    "sys-space/bin"
    "backup-space/bin"
    "server-space/bin"
    "creator-space/bin"
    "sconl-space/bin"
)

# ─────────────────────────────────────────────────────────────────────────────
# ── animate-space paths ──
# ─────────────────────────────────────────────────────────────────────────────

ANIMATEX_TEXT_DIR="animate-space/animate-text"
ANIMATEX_TEXT_FONTS_DIR="animate-space/animate-text/fonts"
ANIMATEX_TEXT_EXPORTS_DIR="animate-space/animate-text/exports"
ANIMATEX_TEXT_SCRIPT="animate-space/animate-text/animatex_text.sh"

ANIMATEX_SVG_DIR="animate-space/animate-svg"
ANIMATEX_SVG_EXPORTS_DIR="animate-space/animate-svg/exports"
ANIMATEX_SVG_FONTS_DIR="animate-space/animate-svg/fonts"
ANIMATEX_SVG_SCRIPT="animate-space/animate-svg/animatex_svg.sh"

# ─────────────────────────────────────────────────────────────────────────────
# ── git-space paths ──
# ─────────────────────────────────────────────────────────────────────────────

GITSPACE_LIB_DIR="git-space/lib"
GITSPACE_TEMPLATES_DIR="git-space/templates"
GITSPACE_LOG_DIR="git-space/logs"
GITSPACE_COMPLETION="git-space/completion/gitspace-completion.sh"

# ─────────────────────────────────────────────────────────────────────────────
# ── backup-space paths ──
# ─────────────────────────────────────────────────────────────────────────────

BACKUPSPACE_CONFIG_DIR="backup-space/config"
BACKUPSPACE_LOG_DIR="backup-space/logs"
BACKUPSPACE_CONF="backup-space/config/backups.conf"

# ─────────────────────────────────────────────────────────────────────────────
# ── sconl-space paths ──
# ─────────────────────────────────────────────────────────────────────────────

# Directories within the sconl-space repo folder
SCONLSPACE_LIB_DIR="sconl-space/lib"
SCONLSPACE_BIN_DIR="sconl-space/bin"
SCONLSPACE_DATA_DIR="sconl-space/data"          # flat-file data (gitignored)
SCONLSPACE_EQUICYCLE="sconl-space/lib/equicycle.py"

# iSconl SQLite database directory (used when Flutter apps are installed)
# This is outside the repo — personal data never committed.
# sconlx auto-detects this: if scope.db is here, it switches to SQLite mode.
ISCONL_DATA_DIR="$HOME/.local/share/isconl"

# Individual DB paths — referenced by install.sh for directory creation
ISCONL_SCOPE_DB="$ISCONL_DATA_DIR/scope.db"
ISCONL_SPACE_DB="$ISCONL_DATA_DIR/space.db"
ISCONL_SPARK_DB="$ISCONL_DATA_DIR/spark.db"
ISCONL_EVENTS_DB="$ISCONL_DATA_DIR/isconl_events.db"

# ─────────────────────────────────────────────────────────────────────────────
# ── Shared / install ──
# ─────────────────────────────────────────────────────────────────────────────

USER_BIN_DEFAULT="$HOME/bin"