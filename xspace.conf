# x-space/xspace.conf
#
# Single source of truth for XSpace tool locations.
# Read by install.sh and sourced by lib/*.sh at runtime.
#
# All paths are relative to XSPACE_ROOT, which install.sh sets to
# the parent of x-space/ (i.e. the root of the cloned xspace repo).
# Do not use ~ or $HOME here — expansion happens in the shell scripts
# that source this file, after XSPACE_ROOT is resolved absolutely.
#
# When adding a new space: add its SPACE_DIR entry here, add its
# bin dispatcher to x-space/bin/, add its lib file to x-space/lib/,
# then re-run install.sh. Nothing else needs touching.

# ─────────────────────────────────────────────────────────────────────────────
# CHANGELOG
# ─────────────────────────────────────────────────────────────────────────────
#   v0.1.0 — Initial release. Declares animate-space, git-space, code-space
#             paths. Consumed by install.sh and lib/animatex.sh.
# ─────────────────────────────────────────────────────────────────────────────

# ── Tool space directories (relative to XSPACE_ROOT) ─────────────────────────
ANIMATESPACE_DIR="animate-space"
GITSPACE_DIR="git-space"
CODESPACE_DIR="code-space"

# ── animate-space sub-paths ───────────────────────────────────────────────────
# These let lib/animatex.sh resolve the engine without hardcoding structure.
ANIMATEX_TEXT_DIR="${ANIMATESPACE_DIR}/animate-text"
ANIMATEX_FONTS_DIR="${ANIMATEX_TEXT_DIR}/fonts"
ANIMATEX_EXPORTS_DIR="${ANIMATEX_TEXT_DIR}/exports"
ANIMATEX_PYTHON_SCRIPT="${ANIMATEX_TEXT_DIR}/python/gradient_typing_effect.py"

# ── x-space internal paths ────────────────────────────────────────────────────
XSPACE_BIN_DIR="x-space/bin"
XSPACE_LIB_DIR="x-space/lib"

# ── User bin target ───────────────────────────────────────────────────────────
# Where symlinks are placed so commands are available on PATH.
# Override by exporting USER_BIN before running install.sh.
USER_BIN_DEFAULT="$HOME/bin"