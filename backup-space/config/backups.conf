# backup-space/config/backups.conf
#
# ─────────────────────────────────────────────────────────────────────────────
# backupx job definitions
# ─────────────────────────────────────────────────────────────────────────────
#
#  FORMAT
#  ──────
#  name|method|source|dest|options
#
#  name    Short label — shown in the backupx menu and used in log filenames.
#          Use hyphens, no spaces.
#
#  method  rclone | rsync | tar
#
#  source  Absolute local path (file or directory).
#          {LOCAL_BASE} expands to the OS-appropriate sync root:
#            Linux / macOS  →  ~/_ 
#            Windows        →  ~/Desktop/_
#
#  dest    Destination path.
#          {RCLONE_REMOTE} expands to the remote name set in backupx CONFIG.
#          rclone  →  remote:Path/To/Folder
#          rsync   →  local path or user@host:/path
#          tar     →  absolute path to target .tar.gz file
#
#  options Extra flags passed verbatim to the underlying tool.
#          Leave empty (trailing |) if none needed.
#
# ─────────────────────────────────────────────────────────────────────────────
# ARCHIVE-SYNC BEHAVIOUR (all jobs)
# ─────────────────────────────────────────────────────────────────────────────
#
#  · Local is the source of truth — changes are pushed to the destination.
#  · Files deleted locally are NOT removed at the destination.
#    Instead they are moved into  dest/_archivex/YYYYMMDD_filename.
#  · _archivex is created automatically in the destination if absent.
#  · _archivex never appears locally — it lives only at the destination.
#
# ─────────────────────────────────────────────────────────────────────────────
# FIRST-TIME SETUP
# ─────────────────────────────────────────────────────────────────────────────
#
#  1.  rclone config       — authenticate OneDrive (remote name: onedrive)
#  2.  backupx --init      — pull all remote folders to local (one-time)
#  3.  backupx             — ongoing: push local changes back to remote
#
# ─────────────────────────────────────────────────────────────────────────────
# SECTION HEADERS
# ─────────────────────────────────────────────────────────────────────────────
#
#  Lines beginning with ## are treated as group headers in the backupx UI.
#  They are displayed as section separators — never executed.
#
# ─────────────────────────────────────────────────────────────────────────────
# RCLONE REMOTE PATHS
# ─────────────────────────────────────────────────────────────────────────────
#
#  All rclone jobs below target the personal OneDrive at:
#  https://acexoft-my.sharepoint.com/personal/sconl_acexoft_com/Documents/
#
#  The rclone path is everything after /Documents/ — e.g.:
#    Sconl/Core/Axial/Innovator/Architect/decision-architect
#
# ─────────────────────────────────────────────────────────────────────────────



