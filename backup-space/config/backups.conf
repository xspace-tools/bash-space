# backup-space/config/backups.conf
#
# One backup job per line.
# Format: method|source|dest|options|mode
#
# ─────────────────────────────────────────────────────────────────────────────
# FIELDS
# ─────────────────────────────────────────────────────────────────────────────
#
# method  : rclone | rsync | tar
# source  : absolute local path (file or directory)
# dest    : destination — local path, rclone remote, or archive path
# options : tool flags passed verbatim (leave empty with just | if none needed)
# mode    : copy  → additive, never deletes at destination
#           sync  → mirror, deletes files at dest that aren't in source
#
# Lines starting with # are ignored. Blank lines are ignored.
#
# ─────────────────────────────────────────────────────────────────────────────
# RCLONE EXAMPLES (remote names must be configured in rclone first)
# ─────────────────────────────────────────────────────────────────────────────
# rclone|/home/user/Documents|gdrive:Backups/Documents|--progress --transfers=4|sync
# rclone|/home/user/Pictures|dropbox:Backups/Pictures|--progress|copy
# rclone|/home/user/Projects|onedrive:Dev/Projects|--progress --exclude='.git/**'|sync
#
# ─────────────────────────────────────────────────────────────────────────────
# RSYNC EXAMPLES (SSH remote or local)
# ─────────────────────────────────────────────────────────────────────────────
# rsync|/home/user/Documents|backup@server:/backups/docs|-avz --delete|sync
# rsync|/home/user/Projects|/mnt/external/Projects|-av|copy
#
# ─────────────────────────────────────────────────────────────────────────────
# TAR EXAMPLES (local archive — always copy mode)
# ─────────────────────────────────────────────────────────────────────────────
# tar|/home/user/important|/mnt/usb/important.tar.gz|--exclude='.git'|copy
# tar|/home/user/Documents|/mnt/usb/documents.tar.gz||copy
#
# ─────────────────────────────────────────────────────────────────────────────
# ADD YOUR JOBS BELOW
# ─────────────────────────────────────────────────────────────────────────────