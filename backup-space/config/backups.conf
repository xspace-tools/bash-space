# ─────────────────────────────────────────────────────────────────────────────
# RSYNC TEMPLATE  (local → local, or local → SSH)
# ─────────────────────────────────────────────────────────────────────────────
# my-docs|rsync|{LOCAL_BASE}/my-docs|/mnt/external/my-docs|-av
# my-projects|rsync|{LOCAL_BASE}/my-projects|backup@server:/backups/projects|-avz
#
# ─────────────────────────────────────────────────────────────────────────────
# TAR TEMPLATE  (compressed local archive)
# ─────────────────────────────────────────────────────────────────────────────
# my-archive|tar|{LOCAL_BASE}/my-folder|/mnt/usb/my-folder.tar.gz|--exclude='.git'