# backup-space/config/backups.conf
#
# ─────────────────────────────────────────────────────────────────────────────
# backupx job definitions
# ─────────────────────────────────────────────────────────────────────────────
#
#  FORMAT:  name|method|source|dest|options
#
#  {LOCAL_BASE}    → ~/_ (Linux/macOS)  or  ~/Desktop/_ (Windows)
#  {RCLONE_REMOTE} → RCLONE_REMOTE value in backupx CONFIG (onedrive-sconl)
#
#  All rclone jobs target:
#  https://acexoft-my.sharepoint.com/personal/sconl_acexoft_com/Documents/
#
# ─────────────────────────────────────────────────────────────────────────────
# ARCHIVE-SYNC BEHAVIOUR
# ─────────────────────────────────────────────────────────────────────────────
#
#  · Local is the source of truth.
#  · Deleted files moved to:  dest/_archivex/YYYYMMDD/filename
#  · Renamed files:  tracked server-side via --track-renames (NOT archived)
#  · The _archivex folder is excluded from sync and lives only at the remote.
#
# ─────────────────────────────────────────────────────────────────────────────
# HIERARCHY LEVELS
# ─────────────────────────────────────────────────────────────────────────────
#
#  ◈ Meta    — top-level Sconl folders  (Circle · Core · Crate)
#  ▲ High    — major sections under Core  (Apex · Atlas · Axial)
#  ● Mid     — pillars under Axial  (Creator · Innovator · Visionary)
#  ○ Low     — departments under each pillar
#  · Leaf    — individual role or project folders  ← most common daily use
#
#  Choose ONE level per run. Syncing a parent AND its children is redundant.
#
# ─────────────────────────────────────────────────────────────────────────────
# RENAMED FOLDERS (local names are now source of truth)
# ─────────────────────────────────────────────────────────────────────────────
#
#  Local folders were renamed for intuitive grouping (type-first naming).
#  Old remote name → new remote name (one-time rclone rename needed):
#
#    rclone moveto {RCLONE_REMOTE}:Sconl/Core/Axial/Innovator/Architect/brand-architect \
#                  {RCLONE_REMOTE}:Sconl/Core/Axial/Innovator/Architect/architect-brand
#    rclone moveto {RCLONE_REMOTE}:Sconl/Core/Axial/Innovator/Architect/decision-architect \
#                  {RCLONE_REMOTE}:Sconl/Core/Axial/Innovator/Architect/architect-decision
#    rclone moveto {RCLONE_REMOTE}:Sconl/Core/Axial/Creator/Designer/brand-designer \
#                  {RCLONE_REMOTE}:Sconl/Core/Axial/Creator/Designer/designer-brand
#    rclone moveto {RCLONE_REMOTE}:Sconl/Core/Axial/Creator/Designer/graphic-designer \
#                  {RCLONE_REMOTE}:Sconl/Core/Axial/Creator/Designer/designer-graphic
#    rclone moveto {RCLONE_REMOTE}:Sconl/Core/Axial/Creator/Designer/experience-designer \
#                  {RCLONE_REMOTE}:Sconl/Core/Axial/Creator/Designer/designer-experience
#    rclone moveto {RCLONE_REMOTE}:Sconl/Core/Axial/Innovator/Engineer/systems-engineer \
#                  {RCLONE_REMOTE}:Sconl/Core/Axial/Innovator/Engineer/engineer-systems
#    rclone moveto {RCLONE_REMOTE}:Sconl/Core/Axial/Innovator/Engineer/design-engineer \
#                  {RCLONE_REMOTE}:Sconl/Core/Axial/Innovator/Engineer/engineer-design
#
# ─────────────────────────────────────────────────────────────────────────────
# FIRST-TIME SETUP
# ─────────────────────────────────────────────────────────────────────────────
#
#  1.  rclone config    → authenticate (remote name: onedrive-sconl)
#  2.  backupx --init   → pull remote folders to local (smart: updates existing)
#  3.  backupx          → ongoing: push local changes back to remote
#
# ─────────────────────────────────────────────────────────────────────────────



## ◈ Meta — Sconl root  (syncs EVERYTHING in each top-level folder)

circle|rclone|{LOCAL_BASE}/Circle|{RCLONE_REMOTE}:Sconl/Circle|--transfers=4

core|rclone|{LOCAL_BASE}/Core|{RCLONE_REMOTE}:Sconl/Core|--transfers=4

crate|rclone|{LOCAL_BASE}/Crate|{RCLONE_REMOTE}:Sconl/Crate|--transfers=4



## ▲ High — Core sections  (Apex · Atlas · whole Axial tree)

apex|rclone|{LOCAL_BASE}/Apex|{RCLONE_REMOTE}:Sconl/Core/Apex|--transfers=4

atlas|rclone|{LOCAL_BASE}/Atlas|{RCLONE_REMOTE}:Sconl/Core/Atlas|--transfers=4

axial|rclone|{LOCAL_BASE}/Axial|{RCLONE_REMOTE}:Sconl/Core/Axial|--transfers=4



## ● Mid — Axial pillars  (Creator · Innovator · Visionary)

creator|rclone|{LOCAL_BASE}/Creator|{RCLONE_REMOTE}:Sconl/Core/Axial/Creator|--transfers=4

innovator|rclone|{LOCAL_BASE}/Innovator|{RCLONE_REMOTE}:Sconl/Core/Axial/Innovator|--transfers=4

visionary|rclone|{LOCAL_BASE}/Visionary|{RCLONE_REMOTE}:Sconl/Core/Axial/Visionary|--transfers=4



## ○ Low — Departments  (under Creator / Innovator)

artist|rclone|{LOCAL_BASE}/Artist|{RCLONE_REMOTE}:Sconl/Core/Axial/Creator/Artist|--transfers=4

author|rclone|{LOCAL_BASE}/Author|{RCLONE_REMOTE}:Sconl/Core/Axial/Creator/Author|--transfers=4

designer|rclone|{LOCAL_BASE}/Designer|{RCLONE_REMOTE}:Sconl/Core/Axial/Creator/Designer|--transfers=4

architect|rclone|{LOCAL_BASE}/Architect|{RCLONE_REMOTE}:Sconl/Core/Axial/Innovator/Architect|--transfers=4

engineer|rclone|{LOCAL_BASE}/Engineer|{RCLONE_REMOTE}:Sconl/Core/Axial/Innovator/Engineer|--transfers=4



## · Leaf — Individual role folders  (most common for targeted daily sync)

architect-brand|rclone|{LOCAL_BASE}/architect-brand|{RCLONE_REMOTE}:Sconl/Core/Axial/Innovator/Architect/architect-brand|--transfers=4

architect-decision|rclone|{LOCAL_BASE}/architect-decision|{RCLONE_REMOTE}:Sconl/Core/Axial/Innovator/Architect/architect-decision|--transfers=4

designer-brand|rclone|{LOCAL_BASE}/designer-brand|{RCLONE_REMOTE}:Sconl/Core/Axial/Creator/Designer/designer-brand|--transfers=4

designer-experience|rclone|{LOCAL_BASE}/designer-experience|{RCLONE_REMOTE}:Sconl/Core/Axial/Creator/Designer/designer-experience|--transfers=4

designer-graphic|rclone|{LOCAL_BASE}/designer-graphic|{RCLONE_REMOTE}:Sconl/Core/Axial/Creator/Designer/designer-graphic|--transfers=4

engineer-biomedical|rclone|{LOCAL_BASE}/engineer-biomedical|{RCLONE_REMOTE}:Sconl/Core/Axial/Innovator/Engineer/engineer-biomedical|--transfers=4

engineer-design|rclone|{LOCAL_BASE}/engineer-design|{RCLONE_REMOTE}:Sconl/Core/Axial/Innovator/Engineer/engineer-design|--transfers=4

engineer-systems|rclone|{LOCAL_BASE}/engineer-systems|{RCLONE_REMOTE}:Sconl/Core/Axial/Innovator/Engineer/engineer-systems|--transfers=4



## ◈ Crate — Media

photos|rclone|{LOCAL_BASE}/Photos|{RCLONE_REMOTE}:Sconl/Crate/Media/Photos|--transfers=8 --drive-chunk-size=64M



# ─────────────────────────────────────────────────────────────────────────────
# RSYNC TEMPLATE  (local ↔ local or local ↔ SSH)
# ─────────────────────────────────────────────────────────────────────────────
# name|rsync|{LOCAL_BASE}/folder|/mnt/external/folder|-av
# name|rsync|{LOCAL_BASE}/folder|user@host:/backups/folder|-avz
#
# ─────────────────────────────────────────────────────────────────────────────
# TAR TEMPLATE  (compressed local archive)
# ─────────────────────────────────────────────────────────────────────────────
# name|tar|{LOCAL_BASE}/folder|/mnt/usb/folder.tar.gz|--exclude='.git'
