# backup-space/config/backups.conf
#
# ─────────────────────────────────────────────────────────────────────────────
# backupx job definitions
# ─────────────────────────────────────────────────────────────────────────────
#
#  FORMAT:  name|method|source|dest|options
#
#  {LOCAL_BASE}    -> ~/_ (Linux/macOS)  or  ~/Desktop/_ (Windows)
#  {RCLONE_REMOTE} -> RCLONE_REMOTE value in backupx CONFIG (onedrive-sconl)
#
#  All rclone jobs target:
#  https://acexoft-my.sharepoint.com/personal/sconl_acexoft_com/Documents/
#
# ─────────────────────────────────────────────────────────────────────────────
# ARCHIVE-SYNC BEHAVIOUR
# ─────────────────────────────────────────────────────────────────────────────
#
#  · Local is the source of truth.
#  · Deleted files moved to:  dest/_archivex/YYYYMMDD/filename
#  · Renamed files:  tracked server-side via --track-renames (NOT archived)
#  · The _archivex folder is excluded from sync and lives only at the remote.
#
# ─────────────────────────────────────────────────────────────────────────────
# SPACE LEVELS
# ─────────────────────────────────────────────────────────────────────────────
#
#  Meta Spaces      top-level Sconl folders  (Circle · Core · Crate)    -> key: M
#  Canonical Spaces major sections under Core  (Apex · Atlas · Axial)   -> key: C
#  Identity Spaces  pillars under Axial  (Creator · Innovator · ...)    -> key: I
#  Domain Spaces    departments under each pillar                        -> key: D
#  Unit Spaces      individual role or project folders  (daily default)  -> key: U
#  Gallery          personal media, photos, Circle/Friends               -> key: G
#
#  Choose ONE level per run. Syncing a parent AND its children is redundant.
#  Sub-groups (### markers) are display-only — no effect on execution.
#  Group keys are derived from the first letter of each group name (unique).
#
# ─────────────────────────────────────────────────────────────────────────────
# SYNC MODES  (selected interactively at run time)
# ─────────────────────────────────────────────────────────────────────────────
#
#  1  Sync       push local -> remote, archive remote-only files  (default)
#  2  Pull       copy remote -> local, keep both copies
#  3  Push & clear  push local -> remote, then delete local copy
#  4  Retrieve   copy remote -> local, then delete remote copy
#
# ─────────────────────────────────────────────────────────────────────────────
# RENAMED FOLDERS (local names are now source of truth)
# ─────────────────────────────────────────────────────────────────────────────
#
#    rclone moveto {RCLONE_REMOTE}:Sconl/Core/Axial/Innovator/Architect/brand-architect \
#                  {RCLONE_REMOTE}:Sconl/Core/Axial/Innovator/Architect/architect-brand
#    rclone moveto {RCLONE_REMOTE}:Sconl/Core/Axial/Innovator/Architect/decision-architect \
#                  {RCLONE_REMOTE}:Sconl/Core/Axial/Innovator/Architect/architect-decision
#    rclone moveto {RCLONE_REMOTE}:Sconl/Core/Axial/Creator/Designer/brand-designer \
#                  {RCLONE_REMOTE}:Sconl/Core/Axial/Creator/Designer/designer-brand
#    rclone moveto {RCLONE_REMOTE}:Sconl/Core/Axial/Creator/Designer/graphic-designer \
#                  {RCLONE_REMOTE}:Sconl/Core/Axial/Creator/Designer/designer-graphic
#    rclone moveto {RCLONE_REMOTE}:Sconl/Core/Axial/Creator/Designer/experience-designer \
#                  {RCLONE_REMOTE}:Sconl/Core/Axial/Creator/Designer/designer-experience
#    rclone moveto {RCLONE_REMOTE}:Sconl/Core/Axial/Innovator/Engineer/systems-engineer \
#                  {RCLONE_REMOTE}:Sconl/Core/Axial/Innovator/Engineer/engineer-systems
#    rclone moveto {RCLONE_REMOTE}:Sconl/Core/Axial/Innovator/Engineer/design-engineer \
#                  {RCLONE_REMOTE}:Sconl/Core/Axial/Innovator/Engineer/engineer-design
#
# ─────────────────────────────────────────────────────────────────────────────
# FIRST-TIME SETUP
# ─────────────────────────────────────────────────────────────────────────────
#
#  1.  rclone config    -> authenticate (remote name: onedrive-sconl)
#  2.  backupx --init   -> pull remote folders to local (smart: updates existing)
#  3.  backupx          -> ongoing: push local changes back to remote
#
# ─────────────────────────────────────────────────────────────────────────────



