# ─────────────────────────────────────────────────────────────────────────────
# RSYNC TEMPLATE  (local <-> local or local <-> SSH)
# ─────────────────────────────────────────────────────────────────────────────
# name|rsync|{LOCAL_BASE}/folder|/mnt/external/folder|-av
# name|rsync|{LOCAL_BASE}/folder|user@host:/backups/folder|-avz
#
# ─────────────────────────────────────────────────────────────────────────────
# TAR TEMPLATE  (compressed local archive)
# ─────────────────────────────────────────────────────────────────────────────
# name|tar|{LOCAL_BASE}/folder|/mnt/usb/folder.tar.gz|--exclude='.git'